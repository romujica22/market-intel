<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intel</title>
<style>
:root {
  --bg: #0f0f0d;
  --surface: #161614;
  --surface2: #1e1e1b;
  --border: #2a2a26;
  --accent: #c8f05a;
  --accent2: #f0c85a;
  --text: #e8e8e0;
  --muted: #777770;
  --success: #6ef07a;
  --danger: #f07070;
  --mono: 'SF Mono', 'Fira Code', monospace;
  --sans: -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
.app { display:grid; grid-template-columns:240px 1fr; min-height:100vh; }
.sidebar { border-right:1px solid var(--border); padding:20px; display:flex; flex-direction:column; gap:16px; background:var(--surface); }
.main { padding:24px 28px; overflow-y:auto; }
.app-header { padding:16px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--surface); grid-column:1/-1; }
.app-logo { font-family:var(--mono); font-size:16px; font-weight:600; color:var(--accent); }
.app-pill { font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; border-radius:20px; border:1px solid var(--border); color:var(--muted); margin-left:auto; }
lbl { font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.btn { padding:8px 14px; font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:1px; text-transform:uppercase; border:none; cursor:pointer; border-radius:var(--radius); transition:all 0.12s; }
.btn-accent { background:var(--accent); color:#0f0f0d; }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
input, select { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:12px; padding:8px 10px; border-radius:var(--radius); outline:none; }
.mode-tabs { display:grid; grid-template-columns:1fr 1fr; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:3px; gap:2px; }
.mode-tab { padding:6px; font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; border:none; background:transparent; color:var(--muted); cursor:pointer; border-radius:6px; }
.mode-tab.active { background:var(--surface2); color:var(--text); }
.co-list { display:flex; flex-direction:column; gap:3px; max-height:300px; overflow-y:auto; }
.co-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:var(--radius); border:1px solid transparent; cursor:pointer; }
.co-item.on { border-color:var(--accent); background:rgba(200,240,90,0.06); }
.co-ticker { font-family:var(--mono); font-size:11px; font-weight:500; color:var(--accent); min-width:40px; }
.tbl-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius-lg); }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th { padding:10px 12px; font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; }
thead th.r { text-align:right; }
tbody td { padding:10px 12px; border-bottom:1px solid var(--border); }
tbody td.r { text-align:right; font-family:var(--mono); font-size:11px; }
tbody td.pos { color:var(--success); }
tbody td.neg { color:var(--danger); }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:var(--surface2); }
.company-card { border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:16px; overflow:hidden; }
.card-head { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); background:var(--surface); }
.card-ticker { font-family:var(--mono); font-size:16px; font-weight:500; color:var(--accent); }
.ai-box { background:rgba(200,240,90,0.03); border:1px solid rgba(200,240,90,0.12); border-radius:var(--radius); padding:16px; }
.ai-spinner { width:10px; height:10px; border:1.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
.cursor { display:inline-block; width:2px; height:14px; background:var(--accent); margin-left:2px; animation:blink 1s step-end infinite; vertical-align:text-bottom; }
@keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0; } }
@keyframes spin { to { transform:rotate(360deg); } }
.fin-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-bottom:14px; }
.fin-cell { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:9px 11px; }
.qtr-table { width:100%; border-collapse:collapse; font-size:11px; margin-bottom:14px; }
.qtr-table th { font-family:var(--mono); font-size:9px; text-transform:uppercase; color:var(--muted); padding:6px 8px; border-bottom:1px solid var(--border); text-align:right; }
.qtr-table th:first-child { text-align:left; }
.qtr-table td { font-family:var(--mono); padding:7px 8px; border-bottom:1px solid var(--border); text-align:right; }
.qtr-table td:first-child { text-align:left; color:var(--muted); }
.section-rule { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.synth-box { border:1px solid rgba(200,240,90,0.2); border-radius:var(--radius-lg); padding:16px; margin-bottom:16px; }
.quick-btn { font-family:var(--mono); font-size:9px; padding:3px 8px; background:transparent; border:1px solid var(--border); border-radius:20px; color:var(--muted); cursor:pointer; }
.chip { font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--surface); padding:3px 9px; border-radius:20px; border:1px solid var(--border); }
.filing-link { font-family:var(--mono); font-size:10px; color:var(--accent); padding:3px 9px; border:1px solid var(--accent); border-radius:20px; text-decoration:none; }
</style>
</head>
<body>
See GitHub repo for full source. This is a placeholder - the full index.html is in the repo.
</body>
</html>
